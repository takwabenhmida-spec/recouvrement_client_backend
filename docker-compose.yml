

services:

  # ============================================================
  # BASE DE DONNÉES MySQL
  # ============================================================
  db:
    image: mysql:8.0
    container_name: recouvrement_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: YOUR_SECURE_PASSWORD
      MYSQL_DATABASE: recouvrement
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pYOUR_SECURE_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # API .NET 10— RecouvrementAPI
  # ============================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recouvrement_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Port=3306;Database=recouvrement;Uid=root;Pwd=YOUR_SECURE_PASSWORD;
      - Jwt__Key=STBBank_RecouvrementAPI_SecretKey_2026_PFE!
      - Jwt__Issuer=RecouvrementAPI
      - ASPNETCORE_URLS=http://+:5203
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "5203:5203"
    volumes:
      - uploads_data:/app/uploads

  # ============================================================
  # TESTS AUTOMATISÉS 
  # ============================================================
  backend-tests:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: recouvrement_tests
    volumes:
      - .:/src
    working_dir: /src/RecouvrementAPI.Tests
    command: pwsh Run-PfeTests.ps1
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default

volumes:
  mysql_data:
  uploads_data:
